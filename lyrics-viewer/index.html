<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lyrics Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="viewer">
        <header class="viewer-header">
          <div class="viewer-header-row">
            <h2 id="songTitle">Select a song</h2>
          </div>
        </header>
        <div class="lyrics-stage">
          <pre id="lyricsContent" class="lyrics-content"></pre>
          <div id="lyricsLoading" class="lyrics-loading" aria-live="polite" aria-label="Loading lyrics">
            <span class="spinner" aria-hidden="true"></span>
          </div>
        </div>
      </section>
    </main>

    <div id="transposeControls" class="transpose-controls" aria-label="Transpose controls">
      <button id="controlsToggleBtn" class="controls-toggle-btn" type="button" title="Hide/show controls" aria-expanded="true">
        ❯
      </button>
      <div id="transposeActions" class="transpose-actions">
        <button id="transposeUpBtn" type="button" title="Transpose up"><span class="icon-label">▲</span><span class="micro-step-label">+1</span></button>
        <button id="transposeDownBtn" type="button" title="Transpose down"><span class="icon-label">▼</span><span class="micro-step-label">-1</span></button>
        <button id="notationToggleBtn" type="button" title="Toggle notation"><span class="notation-mini">C/Do</span></button>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
